<!-- ==================== LOGIN VIEW ==================== -->
<div class="screen" *ngIf="view === 'login'">
  <div class="login-container">
    <!-- Logo -->
    <div class="logo-wrap">
      <img src="adduLogo.webp" alt="AdDU Logo" class="logo-img" />
    </div>

    <!-- Heading -->
    <h1 class="title">Welcome, Blue Knight</h1>
    <p class="subtitle">AdDU Alumni Portal</p>

    <!-- Form -->
    <div class="form-group">
      <label class="form-label">Alumni ID or Email</label>
      <div class="input-wrap">
        <input
          class="form-input"
          type="text"
          placeholder="Enter your ID or email"
          [(ngModel)]="loginId"
        />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap input-wrap--icon">
        <input
          class="form-input"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Enter your password"
          [(ngModel)]="loginPassword"
        />
        <button class="icon-btn" type="button" (click)="togglePassword()">
          <svg
            *ngIf="!showPassword"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
          >
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
          <svg
            *ngIf="showPassword"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
          >
            <path
              d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
            />
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
            <line x1="1" y1="1" x2="23" y2="23" />
          </svg>
        </button>
      </div>
    </div>

    <div class="forgot-row">
      <button class="link-btn" type="button" (click)="goToForgot()">Forgot Password?</button>
    </div>

    <button class="btn-primary" type="button" (click)="onLogin()">
      Login
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
        <polyline points="10 17 15 12 10 7" />
        <line x1="15" y1="12" x2="3" y2="12" />
      </svg>
    </button>

    <p class="bottom-text">
      Don't have an account? <button class="link-btn link-btn--bold" type="button">Sign Up</button>
    </p>
  </div>
</div>

<!-- ==================== FORGOT PASSWORD VIEW ==================== -->
<div class="screen screen--card" *ngIf="view === 'forgot'">
  <div class="forgot-container">
    <!-- Back -->
    <button class="back-btn" type="button" (click)="backToLogin()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="15 18 9 12 15 6" />
      </svg>
      Back to Login
    </button>

    <div class="divider"></div>

    <!-- Icon -->
    <div class="reset-icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1a3a6b" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        <polyline points="9 12 11 14 15 10" />
      </svg>
    </div>

    <h2 class="forgot-title">Forgot Password?</h2>
    <p class="forgot-desc">
      Select a method to verify your identity and recover your account access.
    </p>

    <!-- Tabs -->
    <div class="tab-row">
      <button
        class="tab-btn"
        [class.tab-btn--active]="forgotTab === 'email'"
        type="button"
        (click)="forgotTab = 'email'"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="4" width="20" height="16" rx="2" />
          <polyline points="2,4 12,13 22,4" />
        </svg>
        Email Address
      </button>
      <button
        class="tab-btn"
        [class.tab-btn--active]="forgotTab === 'id'"
        type="button"
        (click)="forgotTab = 'id'"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="16" rx="2" />
          <line x1="7" y1="9" x2="17" y2="9" />
          <line x1="7" y1="13" x2="13" y2="13" />
        </svg>
        Student ID
      </button>
    </div>

    <!-- Email field -->
    <div *ngIf="forgotTab === 'email'" class="form-group">
      <label class="form-label">School Email Address</label>
      <div class="input-wrap input-wrap--icon-left">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
          <circle cx="12" cy="12" r="4" />
          <path d="M16 12v1a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94" />
        </svg>
        <input
          class="form-input form-input--padded"
          type="email"
          placeholder="e.g. student@university.edu.ph"
          [(ngModel)]="forgotEmail"
        />
      </div>
      <p class="hint-text">We'll send a password reset link to this address.</p>
    </div>

    <!-- Student ID field -->
    <div *ngIf="forgotTab === 'id'" class="form-group">
      <label class="form-label">Student ID Number</label>
      <div class="input-wrap input-wrap--icon-left">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
          <rect x="3" y="4" width="18" height="16" rx="2" />
          <line x1="7" y1="9" x2="17" y2="9" />
          <line x1="7" y1="13" x2="13" y2="13" />
        </svg>
        <input
          class="form-input form-input--padded"
          type="text"
          placeholder="e.g. 2021-00123"
          [(ngModel)]="forgotStudentId"
        />
      </div>
      <p class="hint-text">Enter your AdDU Student ID number.</p>
    </div>

    <button class="btn-primary" type="button" (click)="onContinue()">Continue</button>

    <p class="bottom-text bottom-text--muted">
      Can't access your email or don't know your Student ID?
      <button class="link-btn link-btn--bold" type="button">Contact Support</button>
    </p>
  </div>
</div>
